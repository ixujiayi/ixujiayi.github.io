<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行摄中国 | 双主题地图 · 可点击市级区划</title>
    <!-- ECharts 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- 全国地图数据 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
    <style>
        * {
            transition: background-color 0.25s ease, border-color 0.2s ease, color 0.2s ease;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --bg-card: #222;
            --bg-modal: rgba(15, 15, 15, 0.96);
            --text-primary: #fff;
            --text-secondary: #bbb;
            --text-muted: #888;
            --border-color: #333;
            --nav-hover: #ff9800;
            --card-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        body.light {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-modal: rgba(245, 247, 250, 0.98);
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #5b6e8c;
            --border-color: #e2e8f0;
            --nav-hover: #e67e22;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        header {
            background-color: var(--bg-secondary);
            padding: 20px 0;
            box-shadow: var(--card-shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
        }
        nav a {
            font-weight: bold;
            font-size: 16px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        nav a:hover, nav a.active {
            color: var(--nav-hover);
        }
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-primary);
            background-color: var(--bg-primary);
            transition: all 0.2s;
            margin-left: 20px;
        }
        .theme-toggle:hover {
            background-color: var(--nav-hover);
            color: #fff;
            border-color: var(--nav-hover);
        }
        .map-wrapper {
            text-align: center;
            padding: 20px;
        }
        .map-title {
            margin-bottom: 10px;
            font-size: 32px;
            letter-spacing: 4px;
            color: var(--text-primary);
        }
        .map-subtitle {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 14px;
        }
        .map-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        #china-map {
            width: 100%;
            height: 750px;
            background-color: var(--bg-primary);
            border-radius: 12px;
        }
        #gallery-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-modal);
            z-index: 2000;
            overflow-y: auto;
            padding-top: 50px;
            backdrop-filter: blur(2px);
        }
        .close-btn {
            position: fixed;
            top: 30px;
            right: 40px;
            font-size: 40px;
            color: var(--text-primary);
            cursor: pointer;
            z-index: 2001;
        }
        .close-btn:hover { color: var(--nav-hover); }
        .gallery-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .gallery-location-title {
            font-size: 36px;
            text-align: center;
            margin-bottom: 30px;
            color: var(--nav-hover);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }
        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .photo-desc {
            padding: 15px;
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
        }
        @media (max-width: 700px) {
            nav { gap: 20px; }
            .theme-toggle { margin-left: 0; margin-top: 8px; }
            #china-map { height: 500px; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="#" class="active">摄影地图</a>
            <a href="#">个人随笔</a>
            <a href="#">模电心得</a>
            <a href="#">百亿记录</a>
            <a href="#">未来计划</a>
            <button id="theme-switch-btn" class="theme-toggle">🌙 暗夜模式</button>
        </nav>
    </header>
    <main class="map-wrapper">
        <h1 class="map-title">光影足迹</h1>
        <p class="map-subtitle" id="map-tip">🗺️ 点击省份 → 显示市级区划（可点击） | 橙色光点为摄影作品 | 主题自适应</p>
        <div class="map-container">
            <div id="china-map"></div>
        </div>
    </main>
    <div id="gallery-modal">
        <span class="close-btn" onclick="closeGallery()">&times;</span>
        <div class="gallery-content">
            <h2 class="gallery-location-title" id="location-name">地点名称</h2>
            <div class="photo-grid" id="photo-grid-container"></div>
        </div>
    </div>

    <script>
        // ---------- 摄影作品数据 (城市名尽量与地图市级名称匹配) ----------
        const photoData = [
            { name: "北京市", value: [116.405285, 39.904989], photos: [{ url: "https://images.unsplash.com/photo-1599571234909-29ed5d13214f?q=80&w=600", desc: "故宫角楼 · 历史光影" }] },
            { name: "成都市", value: [104.065735, 30.659462], photos: [{ url: "https://images.unsplash.com/photo-1552652613-2d250f242551?q=80&w=600", desc: "成都街头 · 人间烟火" }] },
            { name: "阿坝藏族羌族自治州", value: [102.221374, 31.899792], photos: [{ url: "https://images.unsplash.com/photo-1533560904424-a0c61dc306fc?q=80&w=600", desc: "九寨沟 · 纯净水色" }] },
            { name: "拉萨市", value: [91.1145, 29.64415], photos: [{ url: "https://images.unsplash.com/photo-1548013146-72479768bada?q=80&w=600", desc: "布达拉宫 · 圣洁日光" }] }
        ];

        // 建立城市名到摄影数据的映射 (方便快速查找)
        const photoMap = new Map();
        photoData.forEach(item => { photoMap.set(item.name, item); });

        // 省份拼音映射
        const provincePinyin = {
            '北京':'beijing','天津':'tianjin','上海':'shanghai','重庆':'chongqing',
            '河北':'hebei','山西':'shanxi','辽宁':'liaoning','吉林':'jilin',
            '黑龙江':'heilongjiang','江苏':'jiangsu','浙江':'zhejiang','安徽':'anhui',
            '福建':'fujian','江西':'jiangxi','山东':'shandong','河南':'henan',
            '湖北':'hubei','湖南':'hunan','广东':'guangdong','海南':'hainan',
            '四川':'sichuan','贵州':'guizhou','云南':'yunnan','陕西':'shanxi1',
            '甘肃':'gansu','青海':'qinghai','台湾':'taiwan','内蒙古':'neimenggu',
            '广西':'guangxi','西藏':'xizang','宁夏':'ningxia','新疆':'xinjiang',
            '香港':'xianggang','澳门':'aomen'
        };

        let myChart = null;
        let currentProvince = null;          // 当前下钻的省份名
        let currentMergedMapName = null;     // 当前合并地图注册名

        // ---------- 主题样式 ----------
        function getThemeStyle() {
            const isLight = document.body.classList.contains('light');
            return {
                areaColorDefault: isLight ? '#e9f0f5' : '#323c48',
                borderColor: isLight ? '#cbd5e1' : '#111111',
                highlightAreaColor: isLight ? '#facc15' : '#ff9800',  // 当前省份高亮色
                labelColor: isLight ? '#1f2a3e' : 'rgba(255,255,255,0.7)',
                labelEmphasis: isLight ? '#e67e22' : '#ffffff',
                tooltipBg: isLight ? 'rgba(255,255,245,0.96)' : 'rgba(30,30,40,0.96)'
            };
        }

        // 生成地图配置 (支持高亮省份)
        function getMapOption(mapName, center = null, zoom = 1.2, highlightProvince = null) {
            const style = getThemeStyle();
            const isLight = document.body.classList.contains('light');
            return {
                tooltip: {
                    trigger: 'item',
                    backgroundColor: style.tooltipBg,
                    borderColor: '#ff9800',
                    borderWidth: 1,
                    textStyle: { color: isLight ? '#1e293b' : '#f0f0f0' },
                    formatter: function(params) {
                        if (params.seriesType === 'effectScatter') {
                            return params.name + ' (' + params.data.photos.length + ' 张照片)<br>✨ 点击查看作品';
                        }
                        if (params.componentSubType === 'geo') {
                            if (!currentProvince && provincePinyin[params.name]) 
                                return params.name + '<br>📌 点击查看市级区划';
                            // 下钻模式下，点击市级区域会提示
                            if (currentProvince) return params.name + '<br>📸 点击查看摄影作品（如有）';
                            return params.name;
                        }
                        return params.name;
                    }
                },
                geo: {
                    map: mapName,
                    roam: true,
                    zoom: zoom,
                    center: center,
                    label: {
                        normal: { show: true, color: style.labelColor, fontSize: 10 },
                        emphasis: { show: true, color: style.labelEmphasis }
                    },
                    itemStyle: {
                        normal: {
                            areaColor: style.areaColorDefault,
                            borderColor: style.borderColor,
                            borderWidth: 0.8
                        },
                        emphasis: { areaColor: '#6c8db0' }
                    },
                    regions: highlightProvince ? [{
                        name: highlightProvince,
                        itemStyle: { normal: { areaColor: style.highlightAreaColor, borderWidth: 1.5, borderColor: '#ffaa33' } },
                        label: { normal: { show: true, color: '#ffffff', fontWeight: 'bold' } }
                    }] : []
                },
                series: [{
                    name: '摄影足迹',
                    type: 'effectScatter',
                    coordinateSystem: 'geo',
                    data: photoData,
                    symbolSize: 15,
                    showEffectOn: 'render',
                    rippleEffect: { brushType: 'stroke', scale: 4 },
                    label: { formatter: '{b}', position: 'right', show: true, color: isLight ? '#2c3e50' : '#ffffff', fontWeight: 'bold', fontSize: 12, offset: [8, 0] },
                    itemStyle: { color: '#ff9800', shadowBlur: 12, shadowColor: '#ff9800cc' },
                    zlevel: 1
                }]
            };
        }

        // 仅更新主题样式 (保留地图状态和 regions)
        function updateThemeOnly() {
            if (!myChart || myChart.isDisposed()) return;
            const style = getThemeStyle();
            const isLight = document.body.classList.contains('light');
            const currentOpt = myChart.getOption();
            if (!currentOpt.geo) return;
            let regions = currentOpt.geo[0]?.regions || [];
            if (currentProvince && regions.length === 0) {
                regions = [{ name: currentProvince, itemStyle: { normal: { areaColor: style.highlightAreaColor } } }];
            }
            myChart.setOption({
                tooltip: { backgroundColor: style.tooltipBg, textStyle: { color: isLight ? '#1e293b' : '#f0f0f0' } },
                geo: {
                    itemStyle: { normal: { areaColor: style.areaColorDefault, borderColor: style.borderColor } },
                    label: { normal: { color: style.labelColor }, emphasis: { color: style.labelEmphasis } },
                    regions: regions
                },
                series: [{ label: { color: isLight ? '#2c3e50' : '#ffffff' } }]
            }, false);
        }

        // ---------- 核心：合并全国地图 + 省份精细地图 (保留邻省，添加市级区划) ----------
        async function drillDownToProvince(provinceName) {
            if (currentProvince === provinceName) return;
            const pinyin = provincePinyin[provinceName];
            if (!pinyin) return;
            
            // 动态加载省份地图js
            const scriptId = `map-${pinyin}`;
            if (!document.getElementById(scriptId)) {
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.id = scriptId;
                    script.src = `https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/province/${pinyin}.js`;
                    script.onload = resolve;
                    script.onerror = () => reject(new Error(`加载 ${provinceName} 地图失败`));
                    document.head.appendChild(script);
                });
            }
            const chinaMap = echarts.getMap('china');
            const provMap = echarts.getMap(provinceName);
            if (!chinaMap.geoJSON || !provMap.geoJSON) {
                alert(`无法获取 ${provinceName} 地图数据`);
                return;
            }
            const chinaGeo = JSON.parse(JSON.stringify(chinaMap.geoJSON));
            const provGeo = provMap.geoJSON;
            
            // 保留其他省份轮廓，替换当前省份为市级精细边界
            const otherFeatures = chinaGeo.features.filter(f => f.properties.name !== provinceName);
            const cityFeatures = provGeo.features;   // 市级/区县级边界
            const mergedFeatures = [...otherFeatures, ...cityFeatures];
            
            const mergedMapName = `merged_${provinceName}_${Date.now()}`;
            echarts.registerMap(mergedMapName, {
                type: 'FeatureCollection',
                features: mergedFeatures
            });
            
            currentProvince = provinceName;
            currentMergedMapName = mergedMapName;
            
            // 计算地图中心（从省份边界获取）
            let center = null;
            if (provGeo.features.length > 0 && provGeo.features[0].properties.cp) {
                center = provGeo.features[0].properties.cp;
            } else {
                // 粗略计算边界中心
                let minLng = 180, maxLng = -180, minLat = 90, maxLat = -90;
                const extractCoords = (coords) => {
                    coords.forEach(coord => {
                        if (typeof coord[0] === 'number') {
                            minLng = Math.min(minLng, coord[0]);
                            maxLng = Math.max(maxLng, coord[0]);
                            minLat = Math.min(minLat, coord[1]);
                            maxLat = Math.max(maxLat, coord[1]);
                        } else {
                            extractCoords(coord);
                        }
                    });
                };
                provGeo.features.forEach(f => {
                    if (f.geometry.type === 'Polygon') extractCoords(f.geometry.coordinates);
                    else if (f.geometry.type === 'MultiPolygon') f.geometry.coordinates.forEach(poly => extractCoords(poly));
                });
                center = [(minLng + maxLng) / 2, (minLat + maxLat) / 2];
            }
            const option = getMapOption(mergedMapName, center, 1.8, provinceName);
            myChart.setOption(option, true);
            document.getElementById('map-tip').innerHTML = `📍 当前：${provinceName} 市级区划（周边省界保留） | 点击任意市可查看摄影作品 | 点击空白区域返回全国`;
        }

        // 返回全国地图
        function returnToChina() {
            if (currentProvince === null) return;
            currentProvince = null;
            currentMergedMapName = null;
            const option = getMapOption('china', null, 1.2, null);
            myChart.setOption(option, true);
            document.getElementById('map-tip').innerHTML = '🗺️ 点击省份 → 显示市级区划（可点击） | 橙色光点为摄影作品 | 主题自适应';
        }

        // ---------- 处理市级区域点击 (下钻模式下) ----------
        function handleCityClick(cityName) {
            if (!currentProvince) return;
            // 查找该城市是否有摄影作品
            const photoItem = photoMap.get(cityName);
            if (photoItem) {
                openGallery(photoItem);
            } else {
                // 友好提示：暂无摄影作品
                alert(`📸 暂无“${cityName}”的摄影作品，欢迎下次补充。`);
            }
        }

        // ---------- 地图事件绑定 (支持市级点击) ----------
        function bindEvents() {
            myChart.off('click');
            myChart.on('click', (params) => {
                // 1. 优先处理摄影光点
                if (params.componentType === 'series' && params.seriesType === 'effectScatter') {
                    openGallery(params.data);
                    return;
                }
                // 2. 地图区域点击
                if (params.componentType === 'geo') {
                    const clickedName = params.name;
                    if (!currentProvince) {
                        // 全国模式：点击省份下钻
                        if (provincePinyin[clickedName]) {
                            drillDownToProvince(clickedName).catch(err => {
                                console.error(err);
                                alert(`无法加载 ${clickedName} 地图，请检查网络`);
                            });
                        }
                    } else {
                        // 下钻模式：点击的是市级区域（或者邻省）
                        // 判断该区域是否属于当前省份的市级区划（通过检查名称是否在 provinceFeatures 中）
                        // 简单方法：如果点击的不是当前省份名称且不是邻省名称（邻省仍会触发，但我们只响应市级）
                        // 更准确：通过地图数据判断该区域是否属于市级（名称长度或特征），这里直接调用城市处理函数
                        // 避免误点邻省触发提示，但邻省也是可点击的，我们限制只有市级名称才响应，否则忽略
                        // 获取当前合并地图中所有市级名称（即 provinceFeatures 中的 name）
                        const provMap = echarts.getMap(currentProvince);
                        if (provMap && provMap.geoJSON) {
                            const cityNames = provMap.geoJSON.features.map(f => f.properties.name);
                            if (cityNames.includes(clickedName)) {
                                handleCityClick(clickedName);
                            } else {
                                // 点击了周边省份或无关区域，不做响应，但保持空白返回功能
                                // 可选轻微提示，但不干扰
                                // console.log("点击了非市级区域：" + clickedName);
                            }
                        } else {
                            // 降级处理：只要不是当前省份名称本身，就当作城市点击
                            if (clickedName !== currentProvince) handleCityClick(clickedName);
                        }
                    }
                }
            });
            // 空白区域返回全国 (下钻模式下点击背景)
            myChart.getZr().off('click');
            myChart.getZr().on('click', (event) => {
                if (!event.target && currentProvince !== null) {
                    returnToChina();
                }
            });
        }

        // ---------- 主题系统 ----------
        let userOverride = false;
        function getSystemTheme() { return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
        let currentTheme = 'dark';
        function applyTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light');
                currentTheme = 'light';
                document.getElementById('theme-switch-btn').innerHTML = '☀️ 明亮模式';
            } else {
                document.body.classList.remove('light');
                currentTheme = 'dark';
                document.getElementById('theme-switch-btn').innerHTML = '🌙 暗夜模式';
            }
            if (myChart && !myChart.isDisposed()) updateThemeOnly();
        }
        function toggleTheme() { userOverride = true; applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
        function initTheme() {
            applyTheme(getSystemTheme());
            userOverride = false;
            const mq = window.matchMedia('(prefers-color-scheme: dark)');
            mq.addEventListener('change', (e) => { if (!userOverride) applyTheme(e.matches ? 'dark' : 'light'); });
            document.getElementById('theme-switch-btn').addEventListener('click', toggleTheme);
        }

        // ---------- 画廊弹窗 ----------
        const modal = document.getElementById('gallery-modal');
        const locationTitle = document.getElementById('location-name');
        const photoGrid = document.getElementById('photo-grid-container');
        function openGallery(data) {
            locationTitle.innerText = "📸 拍摄地：" + data.name;
            photoGrid.innerHTML = "";
            data.photos.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `<img src="${photo.url}" alt="${photo.desc}" loading="lazy"><div class="photo-desc">${photo.desc}</div>`;
                photoGrid.appendChild(card);
            });
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        window.closeGallery = function() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        };
        modal.addEventListener('click', (e) => { if (e.target === modal) closeGallery(); });

        // ---------- 初始化地图 ----------
        function initMap() {
            const dom = document.getElementById('china-map');
            if (myChart) myChart.dispose();
            myChart = echarts.init(dom);
            myChart.setOption(getMapOption('china', null, 1.2, null));
            bindEvents();
            window.addEventListener('resize', () => myChart.resize());
        }
        initMap();
        initTheme();
        setTimeout(() => { if (myChart) updateThemeOnly(); }, 100);
    </script>
</body>
</html>
