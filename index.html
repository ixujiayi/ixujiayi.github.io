<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人空间 | 行摄中国 · 暗夜与明亮双主题</title>
    <!-- 引入 ECharts 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- 引入全国地图数据 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
    <style>
        /* ---------- 基础变量与全局过渡 ---------- */
        * {
            transition: background-color 0.25s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* 默认暗夜模式 (dark) 变量 */
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --bg-card: #222;
            --bg-modal: rgba(15, 15, 15, 0.96);
            --text-primary: #fff;
            --text-secondary: #bbb;
            --text-muted: #888;
            --border-color: #333;
            --nav-hover: #ff9800;
            --map-area-dark: #323c48;
            --map-border: #111;
            --map-area-emphasis: #4b5c6e;
            --card-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* 明亮模式变量 */
        body.light {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-modal: rgba(245, 247, 250, 0.98);
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #5b6e8c;
            --border-color: #e2e8f0;
            --nav-hover: #e67e22;
            --map-area-dark: #d9e2ef;
            --map-border: #cbd5e1;
            --map-area-emphasis: #b9c8e0;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        header {
            background-color: var(--bg-secondary);
            padding: 20px 0;
            box-shadow: var(--card-shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
        }
        nav a {
            font-weight: bold;
            font-size: 16px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        nav a:hover, nav a.active {
            color: var(--nav-hover);
        }
        /* 主题切换按钮 */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-primary);
            background-color: var(--bg-primary);
            transition: all 0.2s;
            margin-left: 20px;
        }
        .theme-toggle:hover {
            background-color: var(--nav-hover);
            color: #fff;
            border-color: var(--nav-hover);
        }

        /* 地图容器区域 */
        .map-wrapper {
            text-align: center;
            padding: 20px;
        }
        .map-title {
            margin-bottom: 10px;
            font-size: 32px;
            letter-spacing: 4px;
            color: var(--text-primary);
        }
        .map-subtitle {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 14px;
        }
        .map-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        #china-map {
            width: 100%;
            height: 750px;
            background-color: var(--bg-primary);
            border-radius: 12px;
        }

        /* 画廊弹窗 */
        #gallery-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-modal);
            z-index: 2000;
            overflow-y: auto;
            padding-top: 50px;
            backdrop-filter: blur(2px);
        }
        .close-btn {
            position: fixed;
            top: 30px;
            right: 40px;
            font-size: 40px;
            color: var(--text-primary);
            cursor: pointer;
            transition: color 0.3s;
            z-index: 2001;
        }
        .close-btn:hover {
            color: var(--nav-hover);
        }
        .gallery-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .gallery-location-title {
            font-size: 36px;
            text-align: center;
            margin-bottom: 30px;
            color: var(--nav-hover);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }
        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .photo-desc {
            padding: 15px;
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
        }

        @media (max-width: 700px) {
            nav { gap: 20px; }
            .theme-toggle { margin-left: 0; margin-top: 8px; }
            .map-title { font-size: 24px; }
            #china-map { height: 500px; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="#" class="active">摄影地图</a>
            <a href="#">个人随笔</a>
            <a href="#">模电心得</a>
            <a href="#">百亿记录</a>
            <a href="#">未来计划</a>
            <button id="theme-switch-btn" class="theme-toggle">🌙 暗夜模式</button>
        </nav>
    </header>

    <main class="map-wrapper">
        <h1 class="map-title">光影足迹</h1>
        <p class="map-subtitle" id="map-tip">🗺️ 点击省份可下钻查看市区地图，点击橙色光点查看摄影作品 | 主题跟随系统/可手动切换</p>
        
        <div class="map-container">
            <div id="china-map"></div>
        </div>
    </main>

    <!-- 画廊弹窗 -->
    <div id="gallery-modal">
        <span class="close-btn" onclick="closeGallery()">&times;</span>
        <div class="gallery-content">
            <h2 class="gallery-location-title" id="location-name">地点名称</h2>
            <div class="photo-grid" id="photo-grid-container"></div>
        </div>
    </div>

    <script>
        // ---------- 摄影作品数据 ----------
        const photoData = [
            {
                name: "北京市区", 
                value: [116.405285, 39.904989],
                photos: [
                    { url: "https://images.unsplash.com/photo-1599571234909-29ed5d13214f?q=80&w=600", desc: "故宫角楼 · 历史光影" }
                ]
            },
            {
                name: "成都市", 
                value: [104.065735, 30.659462], 
                photos: [
                    { url: "https://images.unsplash.com/photo-1552652613-2d250f242551?q=80&w=600", desc: "成都街头 · 人间烟火" }
                ]
            },
            {
                name: "阿坝藏族羌族自治州", 
                value: [102.221374, 31.899792], 
                photos: [
                    { url: "https://images.unsplash.com/photo-1533560904424-a0c61dc306fc?q=80&w=600", desc: "九寨沟 · 纯净水色" }
                ]
            },
            {
                name: "拉萨市", 
                value: [91.1145, 29.64415], 
                photos: [
                    { url: "https://images.unsplash.com/photo-1548013146-72479768bada?q=80&w=600", desc: "布达拉宫 · 圣洁日光" }
                ]
            }
        ];

        // 省份拼音映射表（用于动态加载省份地图js文件）
        const provincePinyin = {
            '北京': 'beijing', '天津': 'tianjin', '上海': 'shanghai', '重庆': 'chongqing',
            '河北': 'hebei', '山西': 'shanxi', '辽宁': 'liaoning', '吉林': 'jilin',
            '黑龙江': 'heilongjiang', '江苏': 'jiangsu', '浙江': 'zhejiang', '安徽': 'anhui',
            '福建': 'fujian', '江西': 'jiangxi', '山东': 'shandong', '河南': 'henan',
            '湖北': 'hubei', '湖南': 'hunan', '广东': 'guangdong', '海南': 'hainan',
            '四川': 'sichuan', '贵州': 'guizhou', '云南': 'yunnan', '陕西': 'shanxi1',
            '甘肃': 'gansu', '青海': 'qinghai', '台湾': 'taiwan', '内蒙古': 'neimenggu',
            '广西': 'guangxi', '西藏': 'xizang', '宁夏': 'ningxia', '新疆': 'xinjiang',
            '香港': 'xianggang', '澳门': 'aomen'
        };

        // ---------- 地图实例与状态 ----------
        const chartDom = document.getElementById('china-map');
        let myChart = null;
        let currentProvince = null;     // 当前下钻的省份名，null表示全国视图

        // ---------- 主题样式辅助函数 ----------
        function getGeoThemeStyle() {
            const isLight = document.body.classList.contains('light');
            return {
                areaColor: isLight ? '#e9f0f5' : '#323c48',
                borderColor: isLight ? '#cbd5e1' : '#111111',
                emphasisAreaColor: isLight ? '#cfdfef' : '#4b5c6e',
                labelColor: isLight ? '#1f2a3e' : 'rgba(255,255,255,0.6)',
                labelEmphasisColor: isLight ? '#e67e22' : '#ffffff',
                tooltipBg: isLight ? 'rgba(255,255,245,0.96)' : 'rgba(30,30,40,0.96)',
                tooltipBorder: isLight ? '#ccc' : '#ff9800'
            };
        }

        // 生成地图配置 (mapName: 'china' 或省份拼音)
        function getMapOption(mapName, center = null, zoom = 1) {
            const style = getGeoThemeStyle();
            const isLight = document.body.classList.contains('light');
            // 根据地图类型设置默认缩放级别：全国1.2，省份下钻建议更高（后续调用时可传入zoom）
            const defaultZoom = (mapName === 'china') ? 1.2 : 1.5;
            const finalZoom = zoom !== undefined ? zoom : defaultZoom;
            
            return {
                tooltip: {
                    trigger: 'item',
                    backgroundColor: style.tooltipBg,
                    borderColor: style.tooltipBorder,
                    borderWidth: 1,
                    textStyle: { color: isLight ? '#1e293b' : '#f0f0f0' },
                    formatter: function (params) {
                        if (params.seriesType === 'effectScatter') {
                            return params.name + ' (' + params.data.photos.length + ' 张照片)<br>✨ 点击查看作品';
                        }
                        // 下钻模式下的提示（省级地图点击市区没有进一步下钻）
                        if (currentProvince) {
                            return params.name;
                        }
                        return params.name + (provincePinyin[params.name] ? '<br>📌 点击查看各市' : '');
                    }
                },
                geo: {
                    map: mapName,
                    roam: true,
                    zoom: finalZoom,
                    center: center,
                    label: {
                        normal: {
                            show: true,
                            color: style.labelColor,
                            fontSize: 10
                        },
                        emphasis: {
                            show: true,
                            color: style.labelEmphasisColor
                        }
                    },
                    itemStyle: {
                        normal: {
                            areaColor: style.areaColor,
                            borderColor: style.borderColor,
                            borderWidth: 0.8
                        },
                        emphasis: {
                            areaColor: style.emphasisAreaColor,
                            borderWidth: 1.2
                        }
                    }
                },
                series: [
                    {
                        name: '摄影足迹',
                        type: 'effectScatter',
                        coordinateSystem: 'geo',
                        data: photoData,
                        symbolSize: 15,
                        showEffectOn: 'render',
                        rippleEffect: { brushType: 'stroke', scale: 4 },
                        label: {
                            formatter: '{b}',
                            position: 'right',
                            show: true,
                            color: isLight ? '#2c3e50' : '#ffffff',
                            fontWeight: 'bold',
                            fontSize: 12,
                            offset: [8, 0]
                        },
                        itemStyle: {
                            color: '#ff9800',
                            shadowBlur: 12,
                            shadowColor: '#ff9800cc'
                        },
                        zlevel: 1
                    }
                ]
            };
        }

        // 更新地图主题（仅改变样式，不改变地图状态）
        function updateThemeOnly() {
            if (!myChart || myChart.isDisposed()) return;
            const currentOption = myChart.getOption();
            if (!currentOption.geo) return;
            const style = getGeoThemeStyle();
            const isLight = document.body.classList.contains('light');
            myChart.setOption({
                tooltip: {
                    backgroundColor: style.tooltipBg,
                    borderColor: style.tooltipBorder,
                    textStyle: { color: isLight ? '#1e293b' : '#f0f0f0' }
                },
                geo: {
                    itemStyle: {
                        normal: {
                            areaColor: style.areaColor,
                            borderColor: style.borderColor
                        },
                        emphasis: {
                            areaColor: style.emphasisAreaColor
                        }
                    },
                    label: {
                        normal: { color: style.labelColor },
                        emphasis: { color: style.labelEmphasisColor }
                    }
                },
                series: [{
                    label: { color: isLight ? '#2c3e50' : '#ffffff' }
                }]
            }, false);
        }

        // ---------- 核心：省份下钻（稳健版） ----------
        function drillDownToProvince(provinceName) {
            if (currentProvince === provinceName) return;
            const pinyin = provincePinyin[provinceName];
            if (!pinyin) return;
            
            // 动态加载省份地图js
            const scriptId = `map-${pinyin}`;
            if (!document.getElementById(scriptId)) {
                const script = document.createElement('script');
                script.id = scriptId;
                script.src = `https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/province/${pinyin}.js`;
                script.onload = () => {
                    renderProvinceMap(provinceName, pinyin);
                };
                script.onerror = () => {
                    console.error(`加载 ${provinceName} 地图失败`);
                    alert(`无法加载 ${provinceName} 地图数据，请检查网络后重试。`);
                };
                document.head.appendChild(script);
            } else {
                renderProvinceMap(provinceName, pinyin);
            }
        }

        function renderProvinceMap(provinceName, pinyin) {
            try {
                // 获取省份地图 geoJSON 数据 (echarts 已注册)
                const provMap = echarts.getMap(provinceName);
                if (!provMap || !provMap.geoJSON) {
                    console.warn(`没有获取到 ${provinceName} 的 geoJSON`);
                    return;
                }
                // 重新注册一份以 provinceName 为名的地图（确保存在）
                // 注意：echarts 自带的省份地图注册名就是 provinceName 本身，直接使用即可
                // 我们直接设置地图名称为 provinceName
                currentProvince = provinceName;
                document.getElementById('map-tip').innerHTML = `📍 当前查看：${provinceName} 市级地图（点击地图空白处返回全国） | 主题可切换`;
                
                // 获取省份中心点（从geo特征中计算或使用默认）
                let center = null;
                if (provMap.geoJSON && provMap.geoJSON.features && provMap.geoJSON.features.length > 0) {
                    // 尝试获取第一个feature的cp属性
                    const firstFeat = provMap.geoJSON.features[0];
                    if (firstFeat.properties && firstFeat.properties.cp) {
                        center = firstFeat.properties.cp;
                    }
                }
                // 设置地图配置，省份地图缩放比稍大
                const option = getMapOption(provinceName, center, 1.6);
                myChart.setOption(option, true);
            } catch (err) {
                console.error("渲染省份地图出错", err);
                alert("渲染失败，请刷新页面重试");
            }
        }

        // 返回全国地图
        function returnToChina() {
            if (currentProvince === null) return;
            currentProvince = null;
            document.getElementById('map-tip').innerHTML = '🗺️ 点击省份可下钻查看市区地图，点击橙色光点查看摄影作品 | 主题跟随系统/可手动切换';
            const option = getMapOption('china', null, 1.2);
            myChart.setOption(option, true);
        }

        // ---------- 地图事件绑定 ----------
        function bindMapEvents() {
            myChart.off('click');      // 避免重复绑定
            myChart.on('click', function (params) {
                // 处理摄影光点点击
                if (params.componentType === 'series' && params.seriesType === 'effectScatter') {
                    openGallery(params.data);
                    return;
                }
                // 处理地图区域点击
                if (params.componentType === 'geo') {
                    const clickedName = params.name;
                    if (!currentProvince) {
                        // 全国模式：判断是否为可下钻省份
                        if (provincePinyin[clickedName]) {
                            drillDownToProvince(clickedName);
                        }
                    } else {
                        // 省级模式下：点击任何区域（通常是市/区），不进行下钻，但保留功能扩展点
                        // 目前不做进一步下钻，点击市区只显示提示（或者空操作）
                        // 但为了交互友好，不做返回操作（只有点击空白处才返回）
                        // 此处什么都不做，由空白区域点击负责返回
                    }
                }
            });
            
            // 点击地图空白区域（背景）返回全国
            myChart.getZr().off('click');
            myChart.getZr().on('click', function (event) {
                // 判断是否点击在图形元素上
                if (!event.target) {
                    if (currentProvince !== null) {
                        returnToChina();
                    }
                } else {
                    // 如果点击目标有父级且为echarts图形，避免误判；但通常target存在表示点中了元素，不处理空白返回
                }
            });
        }

        // 窗口大小自适应
        window.addEventListener('resize', () => {
            if (myChart && !myChart.isDisposed()) myChart.resize();
        });

        // ---------- 主题切换 (系统+手动) ----------
        let userOverrideFlag = false;
        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        let currentTheme = 'dark';
        function applyTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light');
                currentTheme = 'light';
                document.getElementById('theme-switch-btn').innerHTML = '☀️ 明亮模式';
            } else {
                document.body.classList.remove('light');
                currentTheme = 'dark';
                document.getElementById('theme-switch-btn').innerHTML = '🌙 暗夜模式';
            }
            if (myChart && !myChart.isDisposed()) {
                updateThemeOnly();
            }
        }
        function toggleTheme() {
            userOverrideFlag = true;
            if (currentTheme === 'dark') applyTheme('light');
            else applyTheme('dark');
        }
        function initTheme() {
            const sysTheme = getSystemTheme();
            applyTheme(sysTheme);
            userOverrideFlag = false;
            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            const themeChangeHandler = (e) => {
                if (!userOverrideFlag) {
                    applyTheme(e.matches ? 'dark' : 'light');
                }
            };
            mediaQuery.addEventListener('change', themeChangeHandler);
            document.getElementById('theme-switch-btn').addEventListener('click', toggleTheme);
        }

        // ---------- 画廊弹窗逻辑 ----------
        const modal = document.getElementById('gallery-modal');
        const locationTitle = document.getElementById('location-name');
        const photoGrid = document.getElementById('photo-grid-container');
        function openGallery(data) {
            locationTitle.innerText = "📸 拍摄地：" + data.name;
            photoGrid.innerHTML = "";
            data.photos.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `<img src="${photo.url}" alt="${photo.desc}" loading="lazy"><div class="photo-desc">${photo.desc}</div>`;
                photoGrid.appendChild(card);
            });
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        window.closeGallery = function() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        };
        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeGallery();
        });

        // ---------- 初始化地图 ----------
        function initMap() {
            if (myChart) myChart.dispose();
            myChart = echarts.init(chartDom);
            // 设置全国地图
            myChart.setOption(getMapOption('china', null, 1.2));
            bindMapEvents();
        }

        // 启动所有
        initMap();
        initTheme();
        // 保证主题与地图样式完全同步
        setTimeout(() => {
            if (myChart && !myChart.isDisposed()) updateThemeOnly();
        }, 100);
    </script>
</body>
</html>
